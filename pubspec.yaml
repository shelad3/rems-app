name: real_estate_management_system
description: "Real Estate Management System - Manage properties, tenants, leases, and payments by NativeCodeX"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^0.70.2
  shared_preferences: ^2.5.3
  pdf: ^3.11.2
  share_plus: ^10.1.4
  local_auth: ^2.3.0
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  http: ^1.3.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

